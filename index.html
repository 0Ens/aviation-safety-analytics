<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviation Safety Analytics &amp; Anomaly Detection</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1e2a42;
  --border: #2a3550;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --green: #22c55e;
  --green-dim: #166534;
  --orange: #f59e0b;
  --orange-dim: #92400e;
  --red: #ef4444;
  --red-dim: #991b1b;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --purple: #a855f7;
  --font-mono: 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html, body { height: 100%; font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }

/* ===== HEADER ===== */
header {
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  position: relative; z-index: 1000;
}
header .logo { display: flex; align-items: center; gap: 12px; }
header .logo svg { width: 32px; height: 32px; }
header .logo h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
header .logo h1 span { color: var(--cyan); }
header .header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
.sim-badge {
  display: none; padding: 4px 12px; background: var(--orange-dim); color: var(--orange);
  border: 1px solid var(--orange); border-radius: 4px; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; animation: pulse-badge 2s infinite;
}
.sim-badge.active { display: inline-block; }
@keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.refresh-indicator { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }
.connection-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: blink 2s infinite; }
.connection-dot.sim { background: var(--orange); }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== STATS BAR ===== */
.stats-bar {
  height: 80px; display: flex; gap: 12px; padding: 10px 20px;
  background: var(--bg-secondary); border-bottom: 1px solid var(--border);
}
.stat-card {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.stat-card.total::before { background: var(--cyan); }
.stat-card.normal::before { background: var(--green); }
.stat-card.warning::before { background: var(--orange); }
.stat-card.critical::before { background: var(--red); }
.stat-card.alerts::before { background: var(--purple); }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
.stat-value { font-size: 26px; font-weight: 800; font-family: var(--font-mono); }
.stat-card.total .stat-value { color: var(--cyan); }
.stat-card.normal .stat-value { color: var(--green); }
.stat-card.warning .stat-value { color: var(--orange); }
.stat-card.critical .stat-value { color: var(--red); }
.stat-card.alerts .stat-value { color: var(--purple); }

/* ===== MAIN LAYOUT ===== */
.main-container { display: flex; height: calc(100vh - 136px); }
.left-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.right-panel { width: 380px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-secondary); }

/* ===== MAP ===== */
.map-container { flex: 1; position: relative; min-height: 300px; }
#map { width: 100%; height: 100%; background: var(--bg-primary); }
.leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); border-radius: 8px; }
.leaflet-popup-tip { background: var(--bg-card); }
.leaflet-popup-content { font-size: 13px; line-height: 1.6; }
.popup-callsign { font-size: 16px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 6px; }
.popup-row { display: flex; justify-content: space-between; gap: 16px; }
.popup-label { color: var(--text-muted); }
.popup-value { font-family: var(--font-mono); }
.popup-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 6px; }
.popup-status.normal { background: var(--green-dim); color: var(--green); }
.popup-status.warning { background: var(--orange-dim); color: var(--orange); }
.popup-status.critical { background: var(--red-dim); color: var(--red); }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; align-items: center; gap: 12px; padding: 8px 16px;
  background: var(--bg-secondary); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.filter-bar label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.filter-bar input[type="text"], .filter-bar select {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
  padding: 6px 10px; border-radius: 4px; font-size: 13px; font-family: var(--font-mono);
}
.filter-bar input[type="text"]:focus, .filter-bar select:focus { outline: none; border-color: var(--cyan); }
.filter-bar select { min-width: 140px; }
.filter-bar input[type="text"] { width: 160px; }
.filter-checkbox { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.filter-checkbox input { accent-color: var(--cyan); cursor: pointer; }
.filter-checkbox span { font-size: 12px; color: var(--text-secondary); }

/* ===== AIRCRAFT TABLE ===== */
.table-container { flex: 0 0 220px; overflow: auto; background: var(--bg-primary); }
.table-container table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table-container thead { position: sticky; top: 0; z-index: 10; }
.table-container th {
  background: var(--bg-secondary); color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; font-size: 10px; padding: 8px 12px; text-align: left;
  border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
}
.table-container th:hover { color: var(--text-primary); }
.table-container th .sort-arrow { margin-left: 4px; font-size: 9px; }
.table-container td { padding: 6px 12px; border-bottom: 1px solid #1a2235; font-family: var(--font-mono); font-size: 12px; white-space: nowrap; }
.table-container tr.normal { background: transparent; }
.table-container tr.warning { background: rgba(245, 158, 11, 0.06); }
.table-container tr.critical { background: rgba(239, 68, 68, 0.1); }
.table-container tr:hover { background: var(--bg-card-hover); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.normal { background: var(--green); }
.status-dot.warning { background: var(--orange); }
.status-dot.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }

/* ===== RIGHT PANEL: ALERTS ===== */
.alerts-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex;
  align-items: center; justify-content: space-between;
}
.alerts-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); }
.alerts-count { background: var(--red-dim); color: var(--red); padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; font-family: var(--font-mono); }
.alerts-feed { flex: 1; overflow-y: auto; padding: 8px; }
.alert-item {
  padding: 10px 12px; margin-bottom: 6px; border-radius: 6px; border-left: 3px solid;
  font-size: 12px; line-height: 1.5; animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.alert-item.warning { background: rgba(245, 158, 11, 0.08); border-color: var(--orange); }
.alert-item.critical { background: rgba(239, 68, 68, 0.1); border-color: var(--red); }
.alert-time { font-family: var(--font-mono); color: var(--text-muted); font-size: 10px; }
.alert-callsign { font-weight: 700; font-family: var(--font-mono); }
.alert-item.warning .alert-callsign { color: var(--orange); }
.alert-item.critical .alert-callsign { color: var(--red); }
.alert-message { color: var(--text-secondary); margin-top: 2px; }

/* ===== CHART SECTION ===== */
.chart-section { height: 180px; border-top: 1px solid var(--border); padding: 12px; }
.chart-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4a6b; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .main-container { flex-direction: column; }
  .right-panel { width: 100%; height: 250px; border-left: none; border-top: 1px solid var(--border); }
  .table-container { flex: 0 0 180px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <path d="M16 2L4 14l4 2 8-6 8 6 4-2L16 2z" fill="#06b6d4"/>
      <path d="M8 16l-4 6h8l4 8 4-8h8l-4-6" fill="#3b82f6" opacity="0.7"/>
      <circle cx="16" cy="14" r="2" fill="#e2e8f0"/>
    </svg>
    <h1>AVIATION <span>SAFETY</span> ANALYTICS</h1>
  </div>
  <div class="header-right">
    <span class="sim-badge" id="simBadge">SIMULATION MODE</span>
    <span class="refresh-indicator" id="refreshTimer">Next refresh: 15s</span>
    <span class="connection-dot" id="connectionDot"></span>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-card total">
    <div class="stat-label">Total Aircraft</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card normal">
    <div class="stat-label">Normal</div>
    <div class="stat-value" id="statNormal">0</div>
  </div>
  <div class="stat-card warning">
    <div class="stat-label">Warning</div>
    <div class="stat-value" id="statWarning">0</div>
  </div>
  <div class="stat-card critical">
    <div class="stat-label">Critical</div>
    <div class="stat-value" id="statCritical">0</div>
  </div>
  <div class="stat-card alerts">
    <div class="stat-label">Active Alerts</div>
    <div class="stat-value" id="statAlerts">0</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-container">
  <!-- LEFT: Map + Filters + Table -->
  <div class="left-panel">
    <div class="map-container"><div id="map"></div></div>
    <div class="filter-bar">
      <label>Search</label>
      <input type="text" id="filterCallsign" placeholder="Callsign..." />
      <label>Country</label>
      <select id="filterCountry"><option value="">All Countries</option></select>
      <label class="filter-checkbox">
        <input type="checkbox" id="filterAnomalies" />
        <span>Anomalies only</span>
      </label>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th data-col="status">St <span class="sort-arrow"></span></th>
            <th data-col="callsign">Callsign <span class="sort-arrow"></span></th>
            <th data-col="icao24">ICAO24 <span class="sort-arrow"></span></th>
            <th data-col="origin_country">Country <span class="sort-arrow"></span></th>
            <th data-col="altitude">Alt (m) <span class="sort-arrow"></span></th>
            <th data-col="speed">Spd (m/s) <span class="sort-arrow"></span></th>
            <th data-col="vertical_rate">V/S (m/s) <span class="sort-arrow"></span></th>
            <th data-col="squawk">Squawk <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="aircraftTableBody"></tbody>
      </table>
    </div>
  </div>
  <!-- RIGHT: Alerts + Chart -->
  <div class="right-panel">
    <div class="alerts-header">
      <h2>Live Alerts</h2>
      <span class="alerts-count" id="alertsCountBadge">0</span>
    </div>
    <div class="alerts-feed" id="alertsFeed"></div>
    <div class="chart-section">
      <h3>Status Distribution</h3>
      <canvas id="statusChart"></canvas>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// ============================================================
// AVIATION SAFETY ANALYTICS - CORE ENGINE
// ============================================================

(function() {
  'use strict';

  // ---- STATE ----
  let isSimulation = false;
  let aircraftData = [];       // processed aircraft objects
  let previousAltitudes = {};  // icao24 -> last known altitude (for rate-of-change)
  let alerts = [];             // alert log
  let markers = {};            // icao24 -> leaflet marker
  let sortColumn = 'status';
  let sortDirection = 'desc';
  let refreshCountdown = 15;
  let refreshInterval = null;
  let countdownInterval = null;
  let simCycleCount = 0;

  // ---- MAP SETUP ----
  const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([39.0, 35.0], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  // Custom aircraft icon factory
  function createAircraftIcon(status, heading) {
    const colors = { normal: '#22c55e', warning: '#f59e0b', critical: '#ef4444' };
    const glows = { normal: 'none', warning: '0 0 6px #f59e0b', critical: '0 0 10px #ef4444' };
    const color = colors[status] || colors.normal;
    const glow = glows[status] || glows.normal;
    const rotation = heading || 0;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" style="filter: drop-shadow(${glow}); transform: rotate(${rotation}deg);">
      <path d="M12 2 L10 10 L3 13 L3 14 L10 12.5 L10 19 L8 21 L8 22 L12 20.5 L16 22 L16 21 L14 19 L14 12.5 L21 14 L21 13 L14 10 Z" fill="${color}" stroke="${color}" stroke-width="0.3"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
      className: ''
    });
  }

  // ---- CHART SETUP ----
  const ctx = document.getElementById('statusChart').getContext('2d');
  const statusChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Normal', 'Warning', 'Critical'],
      datasets: [{
        data: [0, 0, 0],
        backgroundColor: ['#166534', '#92400e', '#991b1b'],
        borderColor: ['#22c55e', '#f59e0b', '#ef4444'],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#94a3b8', font: { size: 11 }, padding: 10, boxWidth: 12 }
        }
      }
    }
  });

  // ---- ANOMALY DETECTION ENGINE ----
  function detectAnomalies(ac) {
    // ac: { icao24, callsign, origin_country, longitude, latitude, altitude, on_ground, velocity, heading, vertical_rate, squawk }
    const anomalies = [];

    // Skip aircraft on ground
    if (ac.on_ground) return { status: 'normal', anomalies: [] };

    // 1. Rapid altitude drop: >1000 ft/min descent when below 10000 ft
    //    1000 ft/min ~= 5.08 m/s; 10000 ft ~= 3048 m
    if (ac.altitude !== null && ac.vertical_rate !== null) {
      if (ac.altitude < 3048 && ac.vertical_rate < -5.08) {
        anomalies.push({
          severity: 'critical',
          rule: 'Rapid altitude drop',
          detail: `altitude: ${Math.round(ac.altitude)}m, vertical rate: ${ac.vertical_rate.toFixed(1)} m/s`
        });
      }
    }

    // 2. Excessive speed: >600 knots = >308.67 m/s
    if (ac.velocity !== null && ac.velocity > 308.67) {
      anomalies.push({
        severity: 'warning',
        rule: 'Excessive speed',
        detail: `speed: ${Math.round(ac.velocity)} m/s (${Math.round(ac.velocity * 1.944)} kts)`
      });
    }

    // 3. Abnormal vertical rate: >4000 ft/min = >20.32 m/s
    if (ac.vertical_rate !== null && Math.abs(ac.vertical_rate) > 20.32) {
      anomalies.push({
        severity: 'warning',
        rule: 'Abnormal vertical rate',
        detail: `vertical rate: ${ac.vertical_rate.toFixed(1)} m/s (${Math.round(ac.vertical_rate * 196.85)} ft/min)`
      });
    }

    // 4. Unexpected low altitude: <500m and not on ground
    if (ac.altitude !== null && ac.altitude < 500 && ac.altitude > 0 && !ac.on_ground) {
      anomalies.push({
        severity: 'warning',
        rule: 'Unexpected low altitude',
        detail: `altitude: ${Math.round(ac.altitude)}m`
      });
    }

    // 5. Emergency squawk codes
    if (ac.squawk) {
      const squawkCodes = {
        '7500': { severity: 'critical', meaning: 'HIJACK' },
        '7600': { severity: 'critical', meaning: 'RADIO FAILURE' },
        '7700': { severity: 'critical', meaning: 'EMERGENCY' }
      };
      if (squawkCodes[ac.squawk]) {
        anomalies.push({
          severity: squawkCodes[ac.squawk].severity,
          rule: `Squawk ${ac.squawk} - ${squawkCodes[ac.squawk].meaning}`,
          detail: `squawk code: ${ac.squawk}`
        });
      }
    }

    let status = 'normal';
    if (anomalies.some(a => a.severity === 'critical')) status = 'critical';
    else if (anomalies.length > 0) status = 'warning';

    return { status, anomalies };
  }

  // ---- SIMULATED DATA GENERATOR ----
  const SIM_CALLSIGNS_PREFIX = ['TK', 'PC', 'XQ', 'THY', 'SHT', 'AJA', 'KKK', 'SXS', 'PGT', 'THY'];
  const SIM_COUNTRIES = ['Turkey', 'Turkey', 'Turkey', 'Germany', 'United Kingdom', 'France', 'Netherlands', 'Greece', 'Italy', 'Spain'];
  const SIM_AIRPORTS = [
    { name: 'IST', lat: 41.275, lon: 28.752 },
    { name: 'SAW', lat: 40.899, lon: 29.309 },
    { name: 'ESB', lat: 40.128, lon: 32.995 },
    { name: 'ADB', lat: 38.292, lon: 27.157 },
    { name: 'AYT', lat: 36.899, lon: 30.800 },
    { name: 'TZX', lat: 40.995, lon: 39.780 },
    { name: 'DLM', lat: 36.713, lon: 28.793 },
    { name: 'GZT', lat: 36.947, lon: 37.479 }
  ];

  let simFlights = [];
  function initSimFlights() {
    simFlights = [];
    for (let i = 0; i < 55; i++) {
      const prefix = SIM_CALLSIGNS_PREFIX[Math.floor(Math.random() * SIM_CALLSIGNS_PREFIX.length)];
      const num = Math.floor(1000 + Math.random() * 8999);
      const callsign = prefix + num;
      const country = SIM_COUNTRIES[Math.floor(Math.random() * SIM_COUNTRIES.length)];
      const from = SIM_AIRPORTS[Math.floor(Math.random() * SIM_AIRPORTS.length)];
      const to = SIM_AIRPORTS[Math.floor(Math.random() * SIM_AIRPORTS.length)];
      const progress = Math.random();
      const lat = from.lat + (to.lat - from.lat) * progress + (Math.random() - 0.5) * 1.5;
      const lon = from.lon + (to.lon - from.lon) * progress + (Math.random() - 0.5) * 1.5;
      const onGround = Math.random() < 0.08;
      const altitude = onGround ? 0 : (2000 + Math.random() * 10000);
      const velocity = onGround ? (Math.random() * 20) : (150 + Math.random() * 120);
      const heading = Math.atan2(to.lon - from.lon, to.lat - from.lat) * 180 / Math.PI + (Math.random() - 0.5) * 20;
      const verticalRate = onGround ? 0 : ((Math.random() - 0.5) * 6);
      const squawkList = ['1200', '2000', '3415', '4521', '5067', '6234', '0234', '1000'];
      const squawk = squawkList[Math.floor(Math.random() * squawkList.length)];
      const icao24 = Math.random().toString(16).substr(2, 6);

      simFlights.push({
        icao24, callsign, country, lat, lon, altitude, onGround, velocity, heading, verticalRate, squawk,
        dLat: (Math.random() - 0.5) * 0.08,
        dLon: (Math.random() - 0.5) * 0.08
      });
    }
  }

  function getSimulatedStates() {
    simCycleCount++;
    const now = Math.floor(Date.now() / 1000);

    // Move aircraft slightly each tick
    simFlights.forEach(f => {
      if (!f.onGround) {
        f.lat += f.dLat + (Math.random() - 0.5) * 0.01;
        f.lon += f.dLon + (Math.random() - 0.5) * 0.01;
        f.altitude += (Math.random() - 0.5) * 200;
        if (f.altitude < 800) f.altitude = 800 + Math.random() * 500;
        if (f.altitude > 13000) f.altitude = 12500;
        f.velocity += (Math.random() - 0.5) * 10;
        if (f.velocity < 100) f.velocity = 120;
        if (f.velocity > 290) f.velocity = 270;
        f.verticalRate = (Math.random() - 0.5) * 6;
        f.heading += (Math.random() - 0.5) * 5;
      }
      // Keep in rough Turkey bounds
      if (f.lat < 35) f.dLat = Math.abs(f.dLat);
      if (f.lat > 43) f.dLat = -Math.abs(f.dLat);
      if (f.lon < 25) f.dLon = Math.abs(f.dLon);
      if (f.lon > 46) f.dLon = -Math.abs(f.dLon);
    });

    // Inject anomalies every ~2 cycles (30s)
    if (simCycleCount % 2 === 0) {
      const anomalyCount = 1 + Math.floor(Math.random() * 3);
      const available = simFlights.filter(f => !f.onGround);
      for (let i = 0; i < anomalyCount && i < available.length; i++) {
        const idx = Math.floor(Math.random() * available.length);
        const f = available[idx];
        const anomalyType = Math.floor(Math.random() * 5);
        switch (anomalyType) {
          case 0: // rapid altitude drop
            f.altitude = 1500 + Math.random() * 1000;
            f.verticalRate = -(6 + Math.random() * 15);
            break;
          case 1: // excessive speed
            f.velocity = 310 + Math.random() * 50;
            break;
          case 2: // abnormal vertical rate
            f.verticalRate = (Math.random() > 0.5 ? 1 : -1) * (21 + Math.random() * 10);
            break;
          case 3: // low altitude
            f.altitude = 100 + Math.random() * 350;
            f.verticalRate = (Math.random() - 0.5) * 4;
            break;
          case 4: // emergency squawk
            f.squawk = ['7500', '7600', '7700'][Math.floor(Math.random() * 3)];
            break;
        }
        available.splice(idx, 1);
      }
    }

    // Reset emergency squawks after a few cycles
    if (simCycleCount % 5 === 0) {
      simFlights.forEach(f => {
        if (['7500', '7600', '7700'].includes(f.squawk)) {
          f.squawk = '1200';
        }
      });
    }

    const states = simFlights.map(f => [
      f.icao24,           // 0 icao24
      f.callsign + '  ',  // 1 callsign (padded like real API)
      f.country,           // 2 origin_country
      now,                 // 3 time_position
      now,                 // 4 last_contact
      f.lon,               // 5 longitude
      f.lat,               // 6 latitude
      f.altitude,          // 7 baro_altitude
      f.onGround,          // 8 on_ground
      f.velocity,          // 9 velocity
      f.heading,           // 10 true_track
      f.verticalRate,      // 11 vertical_rate
      null,                // 12 sensors
      f.altitude,          // 13 geo_altitude
      f.squawk,            // 14 squawk
      false,               // 15 spi
      0                    // 16 position_source
    ]);

    return { time: now, states };
  }

  // ---- FETCH DATA ----
  async function fetchFlightData() {
    try {
      const resp = await fetch('https://opensky-network.org/api/states/all?lamin=35.8&lomin=25.5&lamax=42.2&lomax=45.0');
      if (!resp.ok) throw new Error('API response not OK: ' + resp.status);
      const data = await resp.json();
      if (!data.states || data.states.length === 0) throw new Error('No states in response');
      setSimulationMode(false);
      return data;
    } catch (e) {
      console.log('API unavailable, using simulation:', e.message);
      setSimulationMode(true);
      return getSimulatedStates();
    }
  }

  function setSimulationMode(sim) {
    isSimulation = sim;
    document.getElementById('simBadge').classList.toggle('active', sim);
    document.getElementById('connectionDot').classList.toggle('sim', sim);
  }

  // ---- PROCESS DATA ----
  function processStates(data) {
    if (!data || !data.states) return [];
    return data.states
      .filter(s => s[5] !== null && s[6] !== null) // must have position
      .map(s => {
        const ac = {
          icao24: s[0],
          callsign: (s[1] || '').trim(),
          origin_country: s[2] || 'Unknown',
          longitude: s[5],
          latitude: s[6],
          altitude: s[7],
          on_ground: s[8],
          velocity: s[9],
          heading: s[10],
          vertical_rate: s[11],
          squawk: s[14] || null
        };
        const result = detectAnomalies(ac);
        ac.status = result.status;
        ac.anomalies = result.anomalies;
        return ac;
      });
  }

  // ---- GENERATE ALERTS ----
  function generateAlerts(aircraft) {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB');
    aircraft.forEach(ac => {
      if (ac.anomalies.length === 0) return;
      ac.anomalies.forEach(a => {
        const alert = {
          time: timeStr,
          callsign: ac.callsign || ac.icao24,
          severity: a.severity,
          rule: a.rule,
          detail: a.detail,
          id: Date.now() + Math.random()
        };
        alerts.unshift(alert);
      });
    });
    // Keep max 50
    if (alerts.length > 50) alerts.length = 50;
  }

  // ---- UPDATE UI ----
  function updateStats(aircraft) {
    const total = aircraft.length;
    const normal = aircraft.filter(a => a.status === 'normal').length;
    const warning = aircraft.filter(a => a.status === 'warning').length;
    const critical = aircraft.filter(a => a.status === 'critical').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statNormal').textContent = normal;
    document.getElementById('statWarning').textContent = warning;
    document.getElementById('statCritical').textContent = critical;
    document.getElementById('statAlerts').textContent = alerts.length;
    document.getElementById('alertsCountBadge').textContent = alerts.length;

    // Update chart
    statusChart.data.datasets[0].data = [normal, warning, critical];
    statusChart.update('none');
  }

  function updateAlertsFeed() {
    const feed = document.getElementById('alertsFeed');
    feed.innerHTML = '';
    alerts.forEach(a => {
      const div = document.createElement('div');
      div.className = 'alert-item ' + a.severity;
      div.innerHTML = `
        <div class="alert-time">${a.time}</div>
        <div><span class="alert-callsign">${a.callsign}</span> - ${a.rule}</div>
        <div class="alert-message">${a.detail}</div>
      `;
      feed.appendChild(div);
    });
  }

  function updateMap(aircraft) {
    const currentIds = new Set(aircraft.map(a => a.icao24));

    // Remove markers for aircraft no longer present
    Object.keys(markers).forEach(id => {
      if (!currentIds.has(id)) {
        map.removeLayer(markers[id]);
        delete markers[id];
      }
    });

    aircraft.forEach(ac => {
      if (ac.latitude == null || ac.longitude == null) return;
      const latlng = [ac.latitude, ac.longitude];
      const icon = createAircraftIcon(ac.status, ac.heading);

      if (markers[ac.icao24]) {
        markers[ac.icao24].setLatLng(latlng);
        markers[ac.icao24].setIcon(icon);
        markers[ac.icao24]._acData = ac;
      } else {
        const marker = L.marker(latlng, { icon }).addTo(map);
        marker._acData = ac;
        marker.on('click', function() {
          const d = this._acData;
          const altStr = d.altitude !== null ? Math.round(d.altitude) + ' m' : 'N/A';
          const spdStr = d.velocity !== null ? Math.round(d.velocity) + ' m/s (' + Math.round(d.velocity * 1.944) + ' kts)' : 'N/A';
          const vsStr = d.vertical_rate !== null ? d.vertical_rate.toFixed(1) + ' m/s' : 'N/A';
          const html = `
            <div class="popup-callsign">${d.callsign || d.icao24}</div>
            <div class="popup-row"><span class="popup-label">ICAO24</span><span class="popup-value">${d.icao24}</span></div>
            <div class="popup-row"><span class="popup-label">Country</span><span class="popup-value">${d.origin_country}</span></div>
            <div class="popup-row"><span class="popup-label">Altitude</span><span class="popup-value">${altStr}</span></div>
            <div class="popup-row"><span class="popup-label">Speed</span><span class="popup-value">${spdStr}</span></div>
            <div class="popup-row"><span class="popup-label">V/S</span><span class="popup-value">${vsStr}</span></div>
            <div class="popup-row"><span class="popup-label">Heading</span><span class="popup-value">${d.heading !== null ? Math.round(d.heading) + '°' : 'N/A'}</span></div>
            <div class="popup-row"><span class="popup-label">Squawk</span><span class="popup-value">${d.squawk || 'N/A'}</span></div>
            <div><span class="popup-status ${d.status}">${d.status.toUpperCase()}</span></div>
            ${d.anomalies.length > 0 ? d.anomalies.map(a => '<div style="margin-top:4px;font-size:11px;color:' + (a.severity === 'critical' ? '#ef4444' : '#f59e0b') + ';">' + a.rule + '</div>').join('') : ''}
          `;
          L.popup({ maxWidth: 280 }).setLatLng(latlng).setContent(html).openOn(map);
        });
        markers[ac.icao24] = marker;
      }
    });
  }

  function updateTable(aircraft) {
    const tbody = document.getElementById('aircraftTableBody');
    const searchVal = document.getElementById('filterCallsign').value.toUpperCase();
    const countryVal = document.getElementById('filterCountry').value;
    const anomaliesOnly = document.getElementById('filterAnomalies').checked;

    let filtered = aircraft.filter(ac => {
      if (searchVal && !(ac.callsign || '').toUpperCase().includes(searchVal) && !ac.icao24.toUpperCase().includes(searchVal)) return false;
      if (countryVal && ac.origin_country !== countryVal) return false;
      if (anomaliesOnly && ac.status === 'normal') return false;
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      const statusOrder = { critical: 0, warning: 1, normal: 2 };
      let va, vb;
      switch (sortColumn) {
        case 'status': va = statusOrder[a.status]; vb = statusOrder[b.status]; break;
        case 'callsign': va = a.callsign || ''; vb = b.callsign || ''; break;
        case 'icao24': va = a.icao24; vb = b.icao24; break;
        case 'origin_country': va = a.origin_country; vb = b.origin_country; break;
        case 'altitude': va = a.altitude || 0; vb = b.altitude || 0; break;
        case 'speed': va = a.velocity || 0; vb = b.velocity || 0; break;
        case 'vertical_rate': va = a.vertical_rate || 0; vb = b.vertical_rate || 0; break;
        case 'squawk': va = a.squawk || ''; vb = b.squawk || ''; break;
        default: va = 0; vb = 0;
      }
      if (typeof va === 'string') {
        return sortDirection === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      return sortDirection === 'asc' ? va - vb : vb - va;
    });

    tbody.innerHTML = filtered.map(ac => `
      <tr class="${ac.status}">
        <td><span class="status-dot ${ac.status}"></span></td>
        <td>${ac.callsign || '-'}</td>
        <td>${ac.icao24}</td>
        <td>${ac.origin_country}</td>
        <td>${ac.altitude !== null ? Math.round(ac.altitude) : '-'}</td>
        <td>${ac.velocity !== null ? Math.round(ac.velocity) : '-'}</td>
        <td>${ac.vertical_rate !== null ? ac.vertical_rate.toFixed(1) : '-'}</td>
        <td>${ac.squawk || '-'}</td>
      </tr>
    `).join('');
  }

  function updateCountryFilter(aircraft) {
    const select = document.getElementById('filterCountry');
    const current = select.value;
    const countries = [...new Set(aircraft.map(a => a.origin_country))].sort();
    const options = '<option value="">All Countries</option>' + countries.map(c => `<option value="${c}"${c === current ? ' selected' : ''}>${c}</option>`).join('');
    select.innerHTML = options;
  }

  // ---- MAIN UPDATE LOOP ----
  async function update() {
    const data = await fetchFlightData();
    aircraftData = processStates(data);
    generateAlerts(aircraftData);
    updateStats(aircraftData);
    updateAlertsFeed();
    updateMap(aircraftData);
    updateCountryFilter(aircraftData);
    updateTable(aircraftData);
  }

  // ---- TABLE SORT ----
  document.querySelectorAll('.table-container th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.getAttribute('data-col');
      if (sortColumn === col) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortColumn = col;
        sortDirection = col === 'status' ? 'desc' : 'asc';
      }
      // Update arrows
      document.querySelectorAll('.table-container th .sort-arrow').forEach(s => s.textContent = '');
      th.querySelector('.sort-arrow').textContent = sortDirection === 'asc' ? ' \u25B2' : ' \u25BC';
      updateTable(aircraftData);
    });
  });

  // ---- FILTER EVENTS ----
  document.getElementById('filterCallsign').addEventListener('input', () => updateTable(aircraftData));
  document.getElementById('filterCountry').addEventListener('change', () => updateTable(aircraftData));
  document.getElementById('filterAnomalies').addEventListener('change', () => updateTable(aircraftData));

  // ---- COUNTDOWN TIMER ----
  function startCountdown() {
    refreshCountdown = 15;
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      refreshCountdown--;
      if (refreshCountdown <= 0) refreshCountdown = 15;
      document.getElementById('refreshTimer').textContent = 'Next refresh: ' + refreshCountdown + 's';
    }, 1000);
  }

  // ---- INIT ----
  initSimFlights();
  update();
  startCountdown();
  refreshInterval = setInterval(() => {
    update();
    refreshCountdown = 15;
  }, 15000);

})();
</script>
</body>
</html>
